<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000" role="img" aria-label="MyProdusen chicken logo">
  <defs>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="10" dy="12" stdDeviation="0" flood-color="#f6c200" flood-opacity="0.95"/>
    </filter>
    <style>
      .stroke{stroke:#050505;stroke-width:64;stroke-linecap:round;stroke-linejoin:round}
    </style>
  </defs>
  <g filter="url(#softShadow)">
    <!-- tail -->
    <path d="M250 510 C120 475 135 395 245 420 C305 433 360 470 420 510" fill="#f5f4f2" class="stroke"/>

    <!-- red comb/back feathers -->
    <path d="M585 205 C615 95 790 75 820 160 C842 222 802 284 748 277 C729 345 665 363 630 316 C574 357 506 316 530 251 C538 228 555 213 585 205Z" fill="#d51f1f" class="stroke"/>
    <path d="M760 260 C850 300 858 430 780 455" fill="#d51f1f" class="stroke"/>
    <path d="M738 430 C828 486 813 612 733 625" fill="#d51f1f" class="stroke"/>

    <!-- body -->
    <path d="M615 250 C744 238 804 364 777 540 C747 727 623 825 457 802 C339 786 264 706 259 584 C252 416 380 329 485 418 C512 328 551 270 615 250Z" fill="#ffcb18" class="stroke"/>

    <!-- white wing/belly -->
    <path d="M259 548 C342 557 438 544 522 517 C514 682 434 744 334 715 C283 700 252 637 259 548Z" fill="#f5f4f2" class="stroke"/>

    <!-- wing top heart-like yellow cutout -->
    <path d="M330 510 C326 447 378 424 408 493 C433 421 495 408 506 511" fill="none" class="stroke"/>

    <!-- head line -->
    <path d="M513 519 C550 371 606 277 691 256" fill="none" class="stroke"/>

    <!-- beak -->
    <path d="M768 412 L848 455 L770 501" fill="#050505"/>

    <!-- eye -->
    <circle cx="642" cy="407" r="28" fill="#050505"/>

    <!-- smile / face mark -->
    <path d="M552 610 L651 618" fill="none" class="stroke"/>
    <path d="M650 620 L634 718" fill="none" class="stroke"/>

    <!-- legs -->
    <path d="M438 803 L438 882" fill="none" class="stroke"/>
    <path d="M520 805 L520 883" fill="none" class="stroke"/>
  </g>
</svg>
