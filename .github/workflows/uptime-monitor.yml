# Self-hosted uptime monitor — no external account needed.
#
# Every ~10 minutes it probes the production /api/health endpoint. If the app
# is down or unhealthy it opens (or comments on) a GitHub issue labelled
# `uptime` — which notifies everyone watching the repo — and fails the run.
# When health recovers it comments and auto-closes the issue.
#
# GitHub's scheduler can delay cron runs under load and pauses schedules after
# 60 days of repo inactivity, so treat this as a solid free baseline and pair
# it with UptimeRobot/Better Stack (docs/uptime-monitoring.md) for 1-minute,
# louder alerting once you have an account.
name: Uptime monitor (production health)

on:
  schedule:
    - cron: '*/10 * * * *' # every 10 minutes (best-effort; GitHub may delay)
  workflow_dispatch:

concurrency:
  group: uptime-monitor
  cancel-in-progress: false

permissions:
  contents: read
  issues: write

env:
  HEALTH_URL: https://myprodusen.online/api/health

jobs:
  health:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Probe /api/health
        id: probe
        run: |
          set +e
          RESP=$(curl -sS -m 20 -w '\n%{http_code}' "$HEALTH_URL")
          CODE=$(printf '%s' "$RESP" | tail -1)
          JSON=$(printf '%s' "$RESP" | sed '$d')
          echo "HTTP $CODE"
          echo "$JSON" | head -c 400
          OK=0
          if [ "$CODE" = "200" ] && printf '%s' "$JSON" | grep -q '"status":"ok"'; then OK=1; fi
          {
            echo "ok=$OK"
            echo "code=$CODE"
            echo "detail<<DETAIL_EOF"
            echo "HTTP $CODE"
            printf '%s' "$JSON" | head -c 500
            echo ""
            echo "DETAIL_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Open / update issue if unhealthy
        if: steps.probe.outputs.ok != '1'
        uses: actions/github-script@v7
        env:
          DETAIL: ${{ steps.probe.outputs.detail }}
        with:
          script: |
            const marker = '<!-- uptime-monitor -->';
            const detail = process.env.DETAIL || '';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = `${marker}\nHealth check **gagal** pada ${new Date().toISOString()}.\n\n\`\`\`\n${detail}\n\`\`\`\n\nRun: ${runUrl}`;
            const { data: open } = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo, state: 'open', labels: 'uptime',
            });
            const existing = open.find((i) => (i.body || '').includes(marker));
            if (existing) {
              await github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo, issue_number: existing.number, body });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo,
                title: '🔴 Produksi tidak sehat — /api/health gagal',
                body, labels: ['uptime'],
              });
            }

      - name: Recover — close the issue if healthy again
        if: steps.probe.outputs.ok == '1'
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- uptime-monitor -->';
            const { data: open } = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo, state: 'open', labels: 'uptime',
            });
            for (const i of open.filter((x) => (x.body || '').includes(marker))) {
              await github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo, issue_number: i.number, body: `✅ Produksi **sehat kembali** pada ${new Date().toISOString()} — menutup otomatis.` });
              await github.rest.issues.update({ owner: context.repo.owner, repo: context.repo.repo, issue_number: i.number, state: 'closed' });
            }

      - name: Fail the run when unhealthy
        if: steps.probe.outputs.ok != '1'
        run: |
          echo "::error::Production health check FAILED (HTTP ${{ steps.probe.outputs.code }})"
          exit 1
