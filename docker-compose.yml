# ============================================================
# MyProdusen — Docker Compose (local development & testing)
# For production, deploy via Coolify (see docs/COOLIFY.md)
# ============================================================

services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://myprodusen:myprodusen@postgres:5432/myprodusen
      REDIS_URL: redis://redis:6379
      REDIS_PASSWORD: ""
      REDIS_DB: 0
      REDIS_MAX_RETRIES: 3
      CACHE_ENABLED: true
      CACHE_DEFAULT_TTL: 300
      JWT_SECRET: local-dev-only-change-this-to-a-strong-random-32-plus-character-secret
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      APP_URL: http://localhost:3000
      NEXTAUTH_SECRET: local-dev-only-nextauth-secret-32-plus-characters
      UPLOAD_DIR: /app/uploads
      ATTENDANCE_SELFIE_DIR: attendance-selfies
      MAX_UPLOAD_SIZE: 5242880
      MAX_SELFIE_SIZE_MB: 1
      DEFAULT_GEOFENCE_RADIUS: 100
      GPS_MAX_ACCURACY_METERS: 100
      DEFAULT_GEOFENCE_RADIUS_METERS: 100
      REJECT_OUTSIDE_GEOFENCE: "true"
      GPS_TIMESTAMP_MAX_AGE_SECONDS: 120
      ATTENDANCE_EXPORT_MAX_ROWS: 5000
      NEXT_PUBLIC_SELFIE_MAX_WIDTH: 720
      NEXT_PUBLIC_SELFIE_MAX_HEIGHT: 720
      NEXT_PUBLIC_SELFIE_IMAGE_QUALITY: 0.75
      NEXT_PUBLIC_SELFIE_TARGET_SIZE_KB: 300
      NEXT_PUBLIC_OSM_TILE_URL: https://tile.openstreetmap.org/{z}/{x}/{y}.png
      SESSION_TIMEOUT_HOURS: 8
    volumes:
      - uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health', (r) => { process.exit(r.statusCode === 200 ? 0 : 1); }).on('error', () => process.exit(1));"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: myprodusen
      POSTGRES_USER: myprodusen
      POSTGRES_PASSWORD: myprodusen
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U myprodusen"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
  redis-data:
  uploads:
